<svg xmlns="http://www.w3.org/2000/svg" width="120" height="34" viewBox="0 0 120 34" role="img" aria-label="Stamped">
  <!-- Stamp frame -->
  <rect x="1.5" y="1.5" width="117" height="31" rx="4.5" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.85"/>
  <!-- Top rule -->
  <line x1="11" y1="9.5" x2="109" y2="9.5" stroke="white" stroke-width="1" stroke-opacity="0.35"/>
  <!-- Wordmark -->
  <text
    x="60" y="21"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="white"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-weight="800"
    font-size="11"
    letter-spacing="2.2"
  >STAMPED</text>
  <!-- Bottom rule -->
  <line x1="11" y1="25.5" x2="109" y2="25.5" stroke="white" stroke-width="1" stroke-opacity="0.35"/>
</svg>
